<!DOCTYPE html>
<html>
<head>
    <title>Add Notice - JEC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand d-flex align-items-center" href="/admin">
            <img src="{{ url_for('static', filename='jec_logo.png') }}" alt="JEC Logo">
            <span>Jhadeswar Engineering College</span>
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/admin">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <header>
            <img src="{{ url_for('static', filename='jec_logo.png') }}" alt="JEC Logo">
            <h1>Jhadeswar Engineering College, Balasore</h1>
        </header>

        <h2 class="mb-4">Add Notice</h2>

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="title" class="form-control" placeholder="Notice Title" required>
            </div>
            <div class="mb-3">
                <textarea name="content" class="form-control" rows="4" placeholder="Notice Content" required></textarea>
            </div>
            <button type="submit" class="btn btn-success">Post Notice</button>
        </form>
    </div>
</body>
</html>
