<!DOCTYPE html>
<html>
<head>
    <title>Update Student - JEC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Update Student: {{ student.name }} (Reg No: {{ student.id }})</h2>

    <form method="POST">
        
        <label for="branch">Branch:</label><br>
        <input type="text" id="branch" name="branch" value="{{ student.branch }}" required><br><br>

        <label for="result">Result:</label><br>
        <input type="text" id="result" name="result" value="{{ student.result }}" required><br><br>

        <button type="submit">Save Changes</button>
    </form>

    <br>
    <a href="{{ url_for('admin_dashboard') }}">⬅ Back to Admin Dashboard</a>

</body>
</html>
