<!DOCTYPE html>
<html>
<head>
    <title>Update Result</title>
</head>
<body>
    <h2>Update Result for {{ student.name }}</h2>
    <form method="POST">
        <label>Result:</label>
        <input type="text" name="result" value="{{ student.result }}"><br><br>
        <label>Attendance (%):</label>
        <input type="text" name="attendance" value="{{ student.attendance }}"><br><br>
        <button type="submit">Update</button>
    </form>
</body>
</html>
