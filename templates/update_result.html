<!DOCTYPE html>
<html>
<head>
    <title>Update Result</title>
</head>
<body>
    <h1>Update Result</h1>
    <p>Updating result for <strong>{{ student.name }}</strong> (Reg No: {{ student.id }})</p>
    <form method="POST">
        <label for="result">Result:</label>
        <input type="text" id="result" name="result" value="{{ student.result }}" required>
        <button type="submit">Save</button>
    </form>
    <p><a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a></p>
</body>
</html>
