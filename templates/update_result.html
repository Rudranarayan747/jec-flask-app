<!DOCTYPE html>
<html>
<head>
    <title>Update Result - JEC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Update Result for {{ student.name }} (Reg No: {{ student.id }})</h2>
    <form method="POST">
        <label for="result">Result:</label>
        <input type="text" id="result" name="result" value="{{ student.result }}" required><br><br>
        <button type="submit">Save</button>
    </form>
    <p><a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a></p>
</body>
</html>
