<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
</head>
<body>
    <h1>Welcome, {{ student.name }}</h1>
    <p>Your Result: {{ student.result }}</p>

    <h2>Notices</h2>
    <ul>
        {% for notice in notices %}
        <li>
            <strong>{{ notice.title }}</strong> - {{ notice.date_posted.strftime('%Y-%m-%d') }}<br>
            {{ notice.content }}
        </li>
        {% endfor %}
    </ul>

    <p><a href="{{ url_for('logout') }}">Logout</a></p>
</body>
</html>
