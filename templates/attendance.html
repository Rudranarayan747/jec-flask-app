<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Dashboard</title>
</head>
<body>
    <h2>Attendance Dashboard</h2>
    <a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a>

    <form method="POST">
        Branch: <input type="text" name="branch" value="{{ selected_branch }}" required>
        Date: <input type="date" name="date" value="{{ selected_date }}" required>
        <button type="submit">Select</button>
    </form>

    {% if students %}
    <form method="POST" action="{{ url_for('submit_attendance') }}">
        <input type="hidden" name="branch" value="{{ selected_branch }}">
        <input type="hidden" name="date" value="{{ selected_date }}">
        <table border="1">
            <tr>
                <th>Student</th>
                {% for p in timetable %}
                    <th>{{ p.subject }}</th>
                {% endfor %}
            </tr>
            {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>
                {% for p in timetable %}
                    <td>
                        <select name="status_{{ s.id }}_{{ p.subject }}">
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                        </select>
                    </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </table>
        <button type="submit">Submit Attendance</button>
    </form>
    {% endif %}
</body>
</html>
