<!DOCTYPE html>
<html>
<head>
    <title>Manage Students</title>
</head>
<body>
    <h2>Manage Students</h2>
    <table border="1">
        <tr>
            <th>Reg No</th>
            <th>Name</th>
            <th>Result</th>
            <th>Attendance</th>
            <th>Actions</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student.reg_no }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.result }}</td>
            <td>{{ student.attendance }}%</td>
            <td>
                <a href="{{ url_for('update_result', reg=student.reg_no) }}">Update Result</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
