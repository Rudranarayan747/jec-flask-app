<!DOCTYPE html>
<html>
<head>
    <title>Manage Students - JEC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Manage Students</h2>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Reg No</th>
                <th>Name</th>
                <th>Result</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.result }}</td>
                <td>
                    <a class="btn btn-primary btn-sm" href="{{ url_for('update_result', reg=student.id) }}">Update</a>
                    <a class="btn btn-danger btn-sm" href="{{ url_for('delete_student', reg=student.id) }}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a></p>
</body>
</html>
