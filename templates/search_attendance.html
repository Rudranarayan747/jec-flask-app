<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Attendance</title>
</head>
<body>
    <h2>Search Attendance</h2>
    <a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a>

    <form method="POST">
        Student: 
        <select name="student_id" required>
            {% for s in students %}
                <option value="{{ s.id }}" {% if selected_student and s.id==selected_student.id %}selected{% endif %}>{{ s.name }} ({{ s.id }})</option>
            {% endfor %}
        </select>
        Date: <input type="date" name="date" value="{{ selected_date }}">
        <button type="submit">Search</button>
    </form>

    {% if records %}
        <h3>Attendance Records:</h3>
        <table border="1">
            <tr>
                <th>Date</th>
                <th>Subject</th>
                <th>Status</th>
            </tr>
            {% for r in records %}
            <tr>
                <td>{{ r.date.strftime("%Y-%m-%d") }}</td>
                <td>{{ r.subject }}</td>
                <td>{{ r.status }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}
</body>
</html>
