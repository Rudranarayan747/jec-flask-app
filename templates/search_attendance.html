<!DOCTYPE html>
<html>
<head>
    <title>Search Attendance - JEC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Search Student Attendance</h1>
    </header>

    <!-- Search Form -->
    <form method="POST">
        <label>Enter Registration Number:</label>
        <input type="text" name="reg" placeholder="e.g. 22CS101" required>
        <button type="submit">Search</button>
    </form>

    <!-- Results -->
    {% if student %}
        <h2>Result for {{ student.name }} ({{ student.id }})</h2>
        <p><strong>Attendance Percentage:</strong> {{ percent|round(2) }}%</p>
        <p><strong>Status:</strong> {{ eligible }}</p>
    {% endif %}

    <!-- Back Link -->
    <p><a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a></p>
</body>
</html>
