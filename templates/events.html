<!DOCTYPE html>
<html>
<head><title>Events Gallery</title></head>
<body>
    <h2>Events Gallery</h2>
    {% if files %}
        <ul>
        {% for file in files %}
            <li>
                {% if file.endswith(('png','jpg','jpeg','gif')) %}
                    <img src="{{ url_for('static', filename='uploads/' ~ file) }}" width="200">
                {% else %}
                    <video width="320" height="240" controls>
                        <source src="{{ url_for('static', filename='uploads/' ~ file) }}">
                    </video>
                {% endif %}
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No event media uploaded yet.</p>
    {% endif %}
</body>
</html>
